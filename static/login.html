<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Close Call – Anmelden</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f1117;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-container {
            width: 100%;
            max-width: 380px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            color: #aaa;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #2a2d37;
            border-radius: 10px;
            background: #1a1d27;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #4a7cff;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            background: #4a7cff;
            color: #fff;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: #3a6ae8;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .error-msg {
            color: #ff8888;
            font-size: 0.9rem;
            margin-top: 0.75rem;
            min-height: 1.3em;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Close Call</h1>
    <p class="subtitle">KI-Verkaufstraining</p>

    <form id="login-form">
        <div class="form-group">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" autocomplete="username" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn" id="btn-login">Anmelden</button>
        <div id="error-msg" class="error-msg"></div>
    </form>
</div>

<script>
(function() {
    "use strict";

    const form = document.getElementById("login-form");
    const errorMsg = document.getElementById("error-msg");
    const btn = document.getElementById("btn-login");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsg.textContent = "";
        btn.disabled = true;

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
            const res = await fetch("/api/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password }),
            });

            if (res.ok) {
                window.location.href = "/";
                return;
            }

            const data = await res.json().catch(() => ({}));
            errorMsg.textContent = data.detail || "Anmeldung fehlgeschlagen.";
        } catch (err) {
            errorMsg.textContent = "Verbindung zum Server fehlgeschlagen.";
        } finally {
            btn.disabled = false;
        }
    });
})();
</script>

</body>
</html>
